<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life in Months | Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Life in Months</div>
        <button id="settings-toggle" class="icon-btn">
            <i class="fas fa-sliders-h"></i>
        </button>
    </header>

    <div class="app-container">
        <main class="grid-section">
            <div id="life-grid" class="life-grid"></div>
        </main>

        <aside class="sidebar">
            <section class="stats-card">
                <div class="stat-group">
                    <span class="stat-label" id="stat-title">Gelebte Zeit</span>
                    <span class="stat-value" id="stat-percent">0%</span>
                    <p class="stat-sub" id="stat-absolute">Lade Daten...</p>
                </div>
            </section>

            <section class="filter-section">
                <button class="filter-btn active" data-filter="standard">Status Quo</button>
                <button class="filter-btn" data-filter="schlaf">Schlaf</button>
                <button class="filter-btn" data-filter="arbeit">Arbeit</button>
                <button class="filter-btn" data-filter="handy">Smartphone</button>
                <button class="filter-btn" data-filter="freunde">Soziales</button>
                <button class="filter-btn" data-filter="sport">Sport</button>
                <button class="filter-btn" data-filter="tv">TV & Streaming</button>
            </section>
        </aside>
    </div>

    <div id="settings-drawer" class="settings-fullscreen">
        <div class="settings-content">
            <header class="settings-header">
                <h2>Persönliche Konfiguration</h2>
                <button id="settings-close" class="close-btn">&times;</button>
            </header>
            
            <div class="settings-grid">
                <button id="btn-example" class="btn-example">Beispiel-Daten laden</button>
                
                <form id="user-form">
                    <div class="settings-section">
                        <h3><i class="fas fa-user"></i> Basis-Daten</h3>
                        <div class="form-row">
                            <div class="field"><label>Vorname</label><input type="text" id="vorname"></div>
                            <div class="field"><label>Alter</label><input type="number" id="alter"></div>
                            <div class="field"><label>Erwartung (Jahre)</label><input type="number" id="lebenserwartung"></div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3><i class="fas fa-clock"></i> Täglicher Zeitvertreib</h3>
                        <div class="form-row">
                            <div class="field"><label>Schlaf (h)</label><input type="number" id="schlaf" step="0.5"></div>
                            <div class="field"><label>Handy (hh:mm)</label><input type="text" id="handy" placeholder="03:00"></div>
                            <div class="field"><label>TV (hh:mm)</label><input type="text" id="tv" placeholder="01:30"></div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3><i class="fas fa-briefcase"></i> Arbeit & Finanzen</h3>
                        <div class="form-row">
                            <div class="field"><label>Arbeit (h/Woche)</label><input type="number" id="arbeitsstunden"></div>
                            <div class="field"><label>Urlaub (Tage/Jahr)</label><input type="number" id="urlaub"></div>
                            <div class="field"><label>Gehalt (€)</label><input type="number" id="gehalt"></div>
                            <div class="field"><label>Vermögen (€)</label><input type="number" id="vermoegen"></div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3><i class="fas fa-heartbeat"></i> Lebensstil</h3>
                        <div class="form-row">
                            <div class="field"><label>Sport (h/Woche)</label><input type="number" id="sport"></div>
                            <div class="field"><label>Freunde (h/Woche)</label><input type="number" id="freunde"></div>
                            <div class="field"><label>Rauchen (Stück/Woche)</label><input type="number" id="rauchen"></div>
                        </div>
                        <div class="form-row">
                            <div class="field">
                                <label>Alkohol</label>
                                <select id="alkohol_konsum">
                                    <option value="nie">Nie</option>
                                    <option value="selten">Selten</option>
                                    <option value="regelmaessig">Regelmäßig</option>
                                </select>
                            </div>
                            <div class="field"><label>Stress</label>
                                <select id="stress">
                                    <option value="niedrig">Niedrig</option>
                                    <option value="normal">Normal</option>
                                    <option value="hoch">Hoch</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-footer">
                        <button type="submit" class="btn-save">Speichern & Visualisieren</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
